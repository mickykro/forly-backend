# Auto-deploy the standalone intake/pages server to the Hostinger VPS on merge
# to main. The VPS holds a git checkout; this workflow SSHes in, pulls the
# latest main, rebuilds the Docker image, and restarts the container.
#
# ── One-time setup ────────────────────────────────────────────────────────
# 1. GitHub → repo Settings → Secrets and variables → Actions, add:
#      VPS_HOST      31.97.216.242
#      VPS_USER      root
#      VPS_SSH_KEY   private key whose public key is in the VPS's
#                    ~/.ssh/authorized_keys (used by this runner to log in)
#
# 2. Give the VPS read access to this private repo via a GitHub Deploy Key:
#      # on the VPS:
#      ssh-keygen -t ed25519 -f ~/.ssh/forly_deploy -N ""
#      cat ~/.ssh/forly_deploy.pub   # → add under repo Settings → Deploy keys (read-only)
#      printf 'Host github.com\n  IdentityFile ~/.ssh/forly_deploy\n  IdentitiesOnly yes\n' >> ~/.ssh/config
#
# 3. Replace the rsync'd dir with a real clone (back it up first):
#      mv /root/forly-backend /root/forly-backend.bak
#      git clone git@github.com:mickykro/forly-backend.git /root/forly-backend
#      cp /root/forly-backend.bak/deploy.env /root/forly-backend/ 2>/dev/null || true
#      cp /root/forly-backend.bak/sa-key.json /root/forly-backend/ 2>/dev/null || true
#
# 4. Create /root/forly-backend/deploy.env (NOT committed) with runtime config:
#      BASE_URL=https://forly.srv1173890.hstgr.cloud
#      PAGE_BASE_URL=https://nadlan.call4li.com   # branded page links (see step 5)
#      N8N_WW1_WEBHOOK_URL=https://n8n.srv1173890.hstgr.cloud/webhook/dashboard-create
#      N8N_PIPELINE_WEBHOOK_URL=https://n8n.srv1173890.hstgr.cloud/webhook/property-page-builder
#      N8N_LEAD_WEBHOOK_URL=https://n8n.srv1173890.hstgr.cloud/webhook/lead-trigger
#      GOOGLE_APPLICATION_CREDENTIALS=/secrets/sa-key.json
#      GREENAPI_INSTANCE=...            # required for OTP + notifications
#      GREENAPI_TOKEN=...
#      NADLAN_JWT_SECRET=...            # required for agent login/dashboard (openssl rand -hex 32)
#      ADMIN_PHONES=972542045280,...    # allowlist for the /admin.html console (comma-separated)
#    and place the Firebase service-account key at /root/forly-backend/sa-key.json
#    NOTE: use the SAME NADLAN_JWT_SECRET the Cloud Functions used, so existing
#    agent session cookies keep working after the cutover to this server.
# ──────────────────────────────────────────────────────────────────────────

name: Deploy server to VPS

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'public-agent/**'
      - 'public-nadlan/**'
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-server
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          # Best-effort: pre-seed the host key so the deploy is pinned when the
          # host is reachable. `|| true` so a keyscan hiccup (it exits 1 on zero
          # keys under `bash -e`) never fails the job — the ssh step below uses
          # accept-new and is the real reachability check, with a clearer error.
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Pull latest main on VPS, rebuild, restart
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" 'bash -seuo pipefail' <<'REMOTE'
          cd /root/forly-backend
          git fetch origin main
          git checkout -B main origin/main
          docker build -f server/Dockerfile -t forly-intake .
          docker rm -f forly-intake 2>/dev/null || true
          # Container is fronted by the existing Traefik proxy (TLS on
          # forly.srv1173890.hstgr.cloud). It must join Traefik's network and
          # carry the router labels — NOT be published on a raw port, or Traefik
          # loses its route and the host 404s.
          docker run -d --name forly-intake --restart unless-stopped \
            --network root_default \
            --env-file /root/forly-backend/deploy.env \
            -v /root/forly-backend/sa-key.json:/secrets/sa-key.json:ro \
            -v forly-uploads:/app/server/data/uploads \
            -l traefik.enable=true \
            -l 'traefik.http.routers.forly.rule=Host(`forly.srv1173890.hstgr.cloud`) || Host(`nadlan.call4li.com`)' \
            -l traefik.http.routers.forly.entrypoints=web,websecure \
            -l traefik.http.routers.forly.tls=true \
            -l traefik.http.routers.forly.tls.certresolver=mytlschallenge \
            -l traefik.http.services.forly.loadbalancer.server.port=8787 \
            forly-intake
          sleep 3
          docker ps --filter name=forly-intake --format 'STATUS: {{.Status}}'
          REMOTE

      - name: Smoke test
        run: |
          # Hit the public HTTPS host (via Traefik) — confirms both the new
          # build AND that Traefik routing/TLS survived the redeploy.
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST \
            "https://forly.srv1173890.hstgr.cloud/createPropertyPage" \
            -H 'Content-Type: application/json' -d '{}' || true)
          echo "createPropertyPage returned $code (expect 400 = new build live behind Traefik)"
          test "$code" = "400"
          # Branded domain — informational only until the owner's DNS record
          # (nadlan.call4li.com → VPS) exists and the LE cert is issued.
          ncode=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 \
            "https://nadlan.call4li.com/p/00000000-0000-0000-0000-000000000000" || true)
          echo "nadlan.call4li.com returned $ncode (200 = branded domain live; anything else = DNS/cert not ready yet, not fatal)"
