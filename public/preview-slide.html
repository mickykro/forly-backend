@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700&display=swap');
* { box-sizing: border-box; }
html { margin: 0; padding: 0; width: 1080px; height: 1350px; direction: rtl; }
body {
  margin: 0;
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  font-family: 'Heebo', Arial, sans-serif;
  background: linear-gradient(145deg, #F5F1F8 0%, #FFFFFF 100%);
  color: #2D1B3D;
  position: relative;
}
.slide {
  position: relative;
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  isolation: isolate;
}
.accent {
  position: absolute;
  border-radius: 999px;
  background: #E8B4D9;
  filter: blur(52px);
  opacity: .36;
  z-index: 0;
}
.accent.one { width: 440px; height: 440px; left: -130px; top: 92px; }
.accent.two { width: 530px; height: 530px; right: -205px; bottom: 235px; opacity: .28; }
.accent.three { width: 285px; height: 285px; left: 270px; bottom: -75px; opacity: .25; }
.visual-wrap {
  position: absolute;
  left: 86px;
  top: 118px;
  width: 908px;
  height: 635px;
  border-radius: 52px;
  overflow: hidden;
  box-shadow: 0 34px 92px rgba(45, 27, 61, .16);
  background: rgba(255,255,255,.72);
  z-index: 1;
}
.visual-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.panel {
  position: absolute;
  right: 86px;
  top: 665px;
  width: 835px;
  min-height: 365px;
  padding: 62px 64px 58px 64px;
  border-radius: 48px;
  background: rgba(255,255,255,.82);
  backdrop-filter: blur(18px);
  box-shadow: 0 22px 70px rgba(45, 27, 61, .12);
  z-index: 3;
  text-align: right;
}
h1 {
  margin: 0 0 26px 0;
  font-family: 'Heebo', Arial, sans-serif;
  font-weight: 700;
  font-size: 76px;
  line-height: 1.08;
  letter-spacing: -1.7px;
  color: #2D1B3D;
}
p {
  margin: 0;
  font-family: 'Heebo', Arial, sans-serif;
  font-weight: 400;
  font-size: 46px;
  line-height: 1.32;
  letter-spacing: -0.65px;
  color: #2D1B3D;
}
.cta {

  right: 64px;
  bottom: 54px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 76px;
  padding: 14px 34px 15px 34px;
  border-radius: 999px;
  background: #2D1B3D;
  color: #FFFFFF;
  font-family: 'Heebo', Arial, sans-serif;
  font-weight: 700;
  font-size: 35px;
  line-height: 1;
  box-shadow: 0 15px 34px rgba(45,27,61,.24);
}
.logo {

  left: 86px;
  bottom: 70px;
  z-index: 5;
  font-family: 'Heebo', Arial, sans-serif;
  font-weight: 700;
  font-size: 35px;
  line-height: 1;
  letter-spacing: -.4px;
  color: #2D1B3D;
  padding: 18px 26px;
  border-radius: 999px;
  background: rgba(255,255,255,.72);
  box-shadow: 0 12px 32px rgba(45,27,61,.10);
}
.info-line {
  position: absolute;
  right: 86px;
  bottom: 82px;
  z-index: 5;
  font-family: 'Heebo', Arial, sans-serif;
  font-weight: 400;
  font-size: 31px;
  line-height: 1.1;
  color: #2D1B3D;
  opacity: .82;
}
.slide.no-cta .panel { min-height: 330px; }
.slide.no-cta .panel p { max-width: 690px; }
.slide.no-cta .panel { padding-bottom: 66px; }
