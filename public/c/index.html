<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>עורך קרוסלה</title>
  <link rel="stylesheet" href="/c/editor.css">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <header class="toolbar">
    <span class="brand">Call4li</span>
    <div class="actions">
      <button id="undoBtn" disabled>↶ בטל</button>
      <button id="saveBtn" class="primary">שמור ושלח</button>
    </div>
    <input type="file" id="bgFileInput" accept="image/*" hidden>
    <div id="status">
      <span class="header-spinner" id="headerSpinner" hidden></span>
      <span id="statusText"></span>
    </div>
  </header>

  <div class="save-modal" id="saveModal" hidden>
    <div class="save-modal-card">
      <div class="modal-spinner"></div>
      <h3 id="saveModalTitle">ממיר את העריכה לתמונות</h3>
      <p id="saveModalMessage">זה ייקח כמה שניות…</p>
      <button id="saveModalDismissBtn" class="dim">סגור והמשך ברקע</button>
    </div>
  </div>

  <div class="success-toast" id="successToast" hidden>
    <span class="check">✓</span>
    <span>השקפים נשלחו ל-WhatsApp בהצלחה</span>
  </div>

  <main id="slideContainer">
    <div id="loadingState">טוען קרוסלה...</div>
  </main>

  <aside id="contextPanel" data-mode="">
    <div class="panel-section panel-text">
      <label>גופן <select id="fontSelect">
        <option value="Heebo">Heebo</option>
        <option value="Rubik">Rubik</option>
        <option value="Assistant">Assistant</option>
        <option value="Frank Ruhl Libre">Frank Ruhl Libre</option>
        <option value="Suez One">Suez One</option>
        <option value="Secular One">Secular One</option>
      </select></label>
      <label>גודל <input type="number" id="fontSize" min="10" max="200" step="2"></label>
      <label>צבע <input type="color" id="fontColor"></label>
      <label>רקע טקסט <input type="color" id="textBgColor" value="#ffffff"></label>
      <button id="textBgClearBtn" type="button" title="נקה רקע טקסט">×</button>
      <label>עיגול <input type="range" id="textBgRadius" min="0" max="60" step="1" value="0"></label>
      <div class="order-group">
        <button id="orderFrontBtnText" title="לחזית">⇈</button>
        <button id="orderForwardBtnText" title="קדימה">↑</button>
        <button id="orderBackwardBtnText" title="אחורה">↓</button>
        <button id="orderBackBtnText" title="לרקע">⇊</button>
      </div>
    </div>
    <div class="panel-section panel-container">
      <label>רקע <input type="color" id="bgColor"></label>
      <label>שקיפות <input type="range" id="bgOpacity" min="0" max="100"></label>
      <div class="order-group">
        <button id="orderFrontBtn" title="לחזית">⇈</button>
        <button id="orderForwardBtn" title="קדימה">↑</button>
        <button id="orderBackwardBtn" title="אחורה">↓</button>
        <button id="orderBackBtn" title="לרקע">⇊</button>
      </div>
      <button id="containerBgImageBtn">+ תמונת רקע</button>
      <button id="containerBgClearBtn">נקה תמונה</button>
      <input type="file" id="containerBgInput" accept="image/*" hidden>
      <button id="deleteContainerBtn" class="danger">מחק מיכל</button>
    </div>
    <button id="closePanelBtn" class="dim">סגור</button>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.13/dist/html-to-image.js"></script>
  <script src="/c/editor.js"></script>
</body>
</html>
